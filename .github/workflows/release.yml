name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Get release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$TARBALL_URL" -o /tmp/release.tar.gz
          SHA256=$(shasum -a 256 /tmp/release.tar.gz | awk '{print $1}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "tarball_url=$TARBALL_URL" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"
          echo "SHA256: $SHA256"

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is not set; aborting." >&2
            exit 1
          fi
          TAG="${{ steps.release_info.outputs.tag }}"
          VERSION="${{ steps.release_info.outputs.version }}"
          URL="${{ steps.release_info.outputs.tarball_url }}"
          SHA256="${{ steps.release_info.outputs.sha256 }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/juanheyns/homebrew-tap.git" tap
          FORMULA="tap/Formula/atmux.rb"
          sed -i "s|url \".*\"|url \"${URL}\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"
          cd tap
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add Formula/atmux.rb
          if git diff --staged --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "atmux ${TAG}"
          git push
